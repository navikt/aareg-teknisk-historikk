apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: aareg-teknisk-historikk
  namespace: arbeidsforhold
  labels:
    team: arbeidsforhold
spec:
  image: {{image}}

  port: 8080

  ingresses:
    - https://aareg-teknisk-historikk.ekstern.dev.nav.no

  env:
    - name: APP_NAME
      value: aareg-teknisk-historikk

    - name: APP_URL_AAREG_SERVICES
      value: https://aareg-services.dev-fss-pub.nais.io
    - name: APP_TEXAS_TARGET_AAREG_SERVICES
      value: api://dev-fss.arbeidsforhold.aareg-services-nais/.default

    - name: APP_URL_AAREG_TILGANGSKONTROLL
      value: http://aareg-tilgangskontroll-q2
    - name: APP_TEXAS_TARGET_AAREG_TILGANGSKONTROLL
      value: api://dev-gcp.arbeidsforhold.aareg-tilgangskontroll-q2/.default

    - name: APP_SECURITY_OIDC_IDP_MASKINPORTEN_ISSUERURL
      value: https://test.maskinporten.no/
    - name: APP_SECURITY_OIDC_IDP_MASKINPORTEN_JWKSETURI
      value: https://test.maskinporten.no/jwks

  observability:
    autoInstrumentation:
      enabled: true
      runtime: java

  replicas:
    min: 1
    max: 1
    cpuThresholdPercentage: 50

  liveness:
    path: /actuator/health/liveness
    initialDelay: 60
    periodSeconds: 2
    timeout: 2
    failureThreshold: 30

  readiness:
    path: /actuator/health/readiness
    initialDelay: 60
    periodSeconds: 2
    timeout: 2
    failureThreshold: 30

  resources:
    requests:
      cpu: 100m
      memory: 500Mi
    limits:
      memory: 10Gi

  prometheus:
    enabled: true
    path: actuator/prometheus

  azure:
    application:
      enabled: true

  maskinporten:
    enabled: true
    scopes:
      exposes:
        - name: v1/arbeidsforhold/tekniskhistorikk
          enabled: true
          product: aareg
          atMaxAge: 180
          delegationSource: altinn
          separator: "/"
          consumers:
            - name: NAV
              orgno: "889640782"
            - name: Barekstad (test-organisasjon)
              orgno: "810514442"
            - name: Fellesordningen for AFP
              orgno: "987414502"

  accessPolicy:
    outbound:
      rules:
        - application: aareg-tilgangskontroll-q2
          namespace: arbeidsforhold
          cluster: dev-gcp
        - application: logging
          namespace: nais-system
      external:
        - host: aareg-services.dev-fss-pub.nais.io
